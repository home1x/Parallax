<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax | Void</title>
    <style>
        /* --- RESET & HIGH-END EDITORIAL STYLE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Custom premium cursor layout */
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #080808;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- ATMOSPHERIC BACKDROP --- */
        #spaceCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            opacity: 0.8;
        }

        /* --- THE GRID LAYOUT --- */
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
        }

        /* --- TOP NAV --- */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .brand-name {
            font-family: "Didot", "Bodoni MT", "Cinzel", serif; /* Premium Serif */
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: #fff;
            transition: opacity 0.3s;
        }

        .brand-name:hover {
            opacity: 0.6;
        }

        .store-anchor {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            text-decoration: none;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 4px;
            transition: border-color 0.3s;
        }

        .store-anchor:hover {
            border-color: rgba(255,255,255,1);
        }

        /* --- MAIN HERO SECTON --- */
        main {
            max-width: 500px;
            margin-top: auto;
            margin-bottom: auto;
            align-self: flex-start;
        }

        .hero-tag {
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            opacity: 0.3;
            margin-bottom: 15px;
        }

        /* --- MINIMALIST EMAIL SUBSCRIPTION --- */
        .email-form {
            position: relative;
            margin-top: 25px;
            width: 100%;
        }

        .email-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 40px 12px 0px;
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.4s;
        }

        .email-input::placeholder {
            color: rgba(255,255,255,0.25);
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .email-input:focus {
            border-color: rgba(255,255,255,0.8);
        }

        .submit-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-50%) translateX(4px);
        }

        /* --- ASYMMETRIC FOOTER --- */
        footer {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: auto;
        }

        .copyright {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            opacity: 0.2;
            text-transform: uppercase;
        }

        .social-matrix {
            display: grid;
            grid-template-columns: repeat(3, auto);
            gap: 15px 40px;
            list-style: none;
        }

        .social-matrix a {
            font-size: 0.75rem;
            text-decoration: none;
            color: #fff;
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        .social-matrix a:hover {
            opacity: 1;
        }

        /* --- THE CUSTOM RETICLE CURSOR --- */
        #ringCursor {
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 999;
            transition: width 0.2s, height 0.2s, border-color 0.2s;
        }

        #dotCursor {
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1000;
        }

        /* Hover states for premium custom cursor expansion */
        .expand-cursor:hover ~ #ringCursor {
            width: 50px;
            height: 50px;
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255,255,255,0.03);
        }

        /* --- RESPONSIVE CONTROLS --- */
        @media (max-width: 768px) {
            .container { padding: 30px; }
            header { flex-direction: column; gap: 15px; }
            footer { flex-direction: column-reverse; align-items: flex-start; gap: 40px; }
            .social-matrix { grid-template-columns: repeat(2, auto); gap: 15px 30px; }
            * { cursor: auto !important; } #ringCursor, #dotCursor { display: none; }
        }
    </style>
</head>
<body>

    <!-- Target Interaction Nodes -->
    <div id="ringCursor"></div>
    <div id="dotCursor"></div>

    <!-- Cosmic Space Canvas Canvas -->
    <canvas id="spaceCanvas"></canvas>

    <div class="container">
        
        <header>
            <a href="#" class="brand-name expand-cursor">Parallax</a>
            <a href="https://boundless-official-store.printify.me/" target="_blank" class="store-anchor expand-cursor">Shop Hub</a>
        </header>

        <main>
            <div class="hero-tag">Transmission // Echoes</div>
            
            <!-- Dynamic Minimalist Newsletter Capture -->
            <form class="email-form expand-cursor" onsubmit="event.preventDefault(); alert('Subscribed to the Parallax network.');">
                <input type="email" class="email-input" placeholder="Join the inner circle (Email)" required autocomplete="off">
                <button type="submit" class="submit-btn">→</button>
            </form>
        </main>

        <footer>
            <div class="copyright">© 2026 Parallax. All Rights Reserved.</div>
            
            <ul class="social-matrix">
                <li><a href="https://www.instagram.com/parallax.x.x?igsh=eTlnM20xZW5lcDUx&utm_source=qr" target="_blank" class="expand-cursor">Instagram</a></li>
                <li><a href="https://m.youtube.com/@parallax.x.x?ra=m" target="_blank" class="expand-cursor">YouTube</a></li>
                <li><a href="https://x.com/Parallax_x_x" target="_blank" class="expand-cursor">X.com</a></li>
                <li><a href="https://www.facebook.com/Parallax.x.x.x.x/" target="_blank" class="expand-cursor">Facebook</a></li>
                <li><a href="https://www.tiktok.com/@parallax.x.x?_r=1&_t=ZT-94UGGvXVNug" target="_blank" class="expand-cursor">TikTok</a></li>
                <li><a href="https://discord.com/invite/rhXuzGvM6" target="_blank" class="expand-cursor">Discord</a></li>
            </ul>
        </footer>

    </div>

    <!-- HYPNOTIC ATMOSPHERIC SYSTEM -->
    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        const ring = document.getElementById('ringCursor');
        const dot = document.getElementById('dotCursor');

        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        let mouse = { x: w / 2, y: h / 2, tx: w / 2, ty: h / 2 };

        window.addEventListener('resize', () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        });

        // Dual tracking for mouse coordinates & cursor aesthetics
        window.addEventListener('mousemove', (e) => {
            mouse.tx = e.clientX;
            mouse.ty = e.clientY;
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });

        // Generate Ambient Dust Fields
        const stars = [];
        for (let i = 0; i < 120; i++) {
            stars.push({
                x: Math.random() * w,
                y: Math.random() * h,
                size: Math.random() * 1.5 + 0.3,
                baseAlpha: Math.random() * 0.4 + 0.1,
                speed: Math.random() * 0.2 + 0.05
            });
        }

        function runSystem() {
            // Smooth easing for the premium trailing ring cursor
            mouse.x += (mouse.tx - mouse.x) * 0.12;
            mouse.y += (mouse.ty - mouse.y) * 0.12;
            ring.style.left = mouse.x + 'px';
            ring.style.top = mouse.y + 'px';

            // Velvet void frame cleanup
            ctx.fillStyle = '#080808';
            ctx.fillRect(0, 0, w, h);

            // Render drifting cosmic dust
            stars.forEach(s => {
                s.y -= s.speed;
                if (s.y < 0) s.y = h;

                // Gentle drift based on mouse coordinate offset
                let parallaxX = (mouse.tx - w / 2) * 0.015;
                let parallaxY = (mouse.ty - h / 2) * 0.015;

                ctx.fillStyle = `rgba(255, 255, 255, ${s.baseAlpha})`;
                ctx.beginPath();
                ctx.arc(s.x + parallaxX, s.y + parallaxY, s.size, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(runSystem);
        }

        runSystem();
    </script>
</body>
</html>
