<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARALLAX | VOID</title>
    <style>
        /* --- RESET & EXPERIMENTAL DARK AESTHETIC --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair; /* Aesthetic choice */
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            letter-spacing: 0.15em;
        }

        /* --- BACKGROUND LAYER --- */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* --- INTERACTIVE CENTERpiece --- */
        .main-container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 40px;
        }

        /* --- TOP NAVIGATION --- */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            mix-blend-mode: difference;
        }

        .store-link {
            font-size: 0.75rem;
            text-transform: uppercase;
            text-decoration: none;
            color: #000;
            background-color: #fff;
            padding: 10px 24px;
            font-weight: 600;
            border-radius: 50px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .store-link:hover {
            transform: scale(1.05);
        }

        /* --- CENTER VISUAL --- */
        .interactive-hero {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 500px;
            height: 500px;
        }

        .visualizer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .center-title {
            position: absolute;
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            margin-right: -0.4em;
            pointer-events: none;
            mix-blend-mode: difference;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* --- FOOTER SOCIAL LINKS --- */
        footer {
            width: 100%;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: clamp(15px, 4vw, 40px);
            list-style: none;
            flex-wrap: wrap;
        }

        .nav-links a {
            font-size: 0.7rem;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            opacity: 0.4;
            transition: opacity 0.3s ease;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        /* Mobile specific styling adjustments */
        @media (max-width: 600px) {
            .main-container { padding: 40px 20px; }
            header { flex-direction: column; gap: 20px; }
            .interactive-hero { max-width: 280px; height: 280px; }
        }
    </style>
</head>
<body>

    <!-- Galaxy / Nebula Background Canvas -->
    <canvas id="bgCanvas"></canvas>

    <div class="main-container">
        <header>
            <a href="#" class="logo">P A R A L L A X</a>
            <a href="https://boundless-official-store.printify.me/" target="_blank" class="store-link">Shop Hub</a>
        </header>

        <!-- Center Interactive Core -->
        <div class="interactive-hero">
            <canvas id="ringCanvas" class="visualizer-ring"></canvas>
            <div class="center-title">PARALLAX</div>
        </div>

        <footer>
            <ul class="nav-links">
                <li><a href="https://www.instagram.com/parallax.x.x?igsh=eTlnM20xZW5lcDUx&utm_source=qr" target="_blank">// Instagram</a></li>
                <li><a href="https://m.youtube.com/@parallax.x.x?ra=m" target="_blank">// YouTube</a></li>
                <li><a href="https://x.com/Parallax_x_x" target="_blank">// X</a></li>
                <li><a href="https://www.facebook.com/Parallax.x.x.x.x/" target="_blank">// Facebook</a></li>
                <li><a href="https://www.tiktok.com/@parallax.x.x?_r=1&_t=ZT-94UGGvXVNug" target="_blank">// TikTok</a></li>
                <li><a href="https://discord.com/invite/rhXuzGvM6" target="_blank">// Discord</a></li>
            </ul>
        </footer>
    </div>

    <script>
        // --- MULTI-CANVAS GRAPHICS SETUP ---
        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        const ringCanvas = document.getElementById('ringCanvas');
        const ringCtx = ringCanvas.getContext('2d');

        let w = bgCanvas.width = window.innerWidth;
        let h = bgCanvas.height = window.innerHeight;
        
        let rw = ringCanvas.width = 500;
        let rh = ringCanvas.height = 500;

        let mouse = { x: w / 2, y: h / 2, tx: w / 2, ty: h / 2 };

        window.addEventListener('resize', () => {
            w = bgCanvas.width = window.innerWidth;
            h = bgCanvas.height = window.innerHeight;
            if(window.innerWidth < 600) {
                rw = ringCanvas.width = 280;
                rh = ringCanvas.height = 280;
            } else {
                rw = ringCanvas.width = 500;
                rh = ringCanvas.height = 500;
            }
        });

        window.addEventListener('mousemove', (e) => {
            mouse.tx = e.clientX;
            mouse.ty = e.clientY;
        });

        // --- BACKGROUND: DUST GALAXY ---
        const particles = [];
        for (let i = 0; i < 200; i++) {
            particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                size: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.1,
                depth: Math.random() * 2
            });
        }

        // --- MAIN ANIMATION LOOP ---
        let time = 0;
        function render() {
            time += 0.02;
            
            // Handle mouse smoothing
            mouse.x += (mouse.tx - mouse.x) * 0.08;
            mouse.y += (mouse.ty - mouse.y) * 0.08;

            // 1. Draw Galaxy Background
            bgCtx.fillStyle = '#050505';
            bgCtx.fillRect(0, 0, w, h);
            
            bgCtx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            particles.forEach(p => {
                // Parallax shift based on mouse depth movement
                let offsetX = (mouse.x - w/2) * 0.02 * p.depth;
                let offsetY = (mouse.y - h/2) * 0.02 * p.depth;
                
                bgCtx.beginPath();
                bgCtx.arc(p.x + offsetX, p.y + offsetY, p.size, 0, Math.PI * 2);
                bgCtx.fill();
                
                // Slow ambient drift
                p.y -= p.speed;
                if (p.y < 0) p.y = h;
            });

            // 2. Draw Interactive Audio-Style Vector Centerpiece
            ringCtx.clearRect(0, 0, rw, rh);
            let cx = rw / 2;
            let cy = rh / 2;
            let baseRadius = rw * 0.35;
            
            // Calculate mouse distance from center to control visual warp intensity
            let dx = mouse.tx - (window.innerWidth / 2);
            let dy = mouse.ty - (window.innerHeight / 2);
            let dist = Math.sqrt(dx*dx + dy*dy);
            let warpIntensity = Math.min(dist * 0.1, 45); // Caps the warp safely

            // Generate fluid waveform ring
            ringCtx.beginPath();
            for (let i = 0; i < 120; i++) {
                let angle = (i / 120) * Math.PI * 2;
                
                // Complex wave mixing for abstract audio-visualizer simulation
                let wave1 = Math.sin(angle * 6 + time) * 15;
                let wave2 = Math.cos(angle * 12 - time * 2) * (warpIntensity * 0.5);
                let interactiveWarp = Math.sin(angle * 3 + time) * warpIntensity;
                
                let r = baseRadius + wave1 + wave2 + interactiveWarp;
                
                let x = cx + Math.cos(angle) * r;
                let y = cy + Math.sin(angle) * r;
                
                if (i === 0) ringCtx.moveTo(x, y);
                else ringCtx.lineTo(x, y);
            }
            ringCtx.closePath();
            ringCtx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
            ringCtx.lineWidth = 1.5;
            ringCtx.stroke();

            // Inner echo ring
            ringCtx.beginPath();
            for (let i = 0; i < 90; i++) {
                let angle = (i / 90) * Math.PI * 2;
                let wave = Math.cos(angle * 8 - time * 1.5) * (10 + warpIntensity * 0.2);
                let r = (baseRadius * 0.8) + wave;
                let x = cx + Math.cos(angle) * r;
                let y = cy + Math.sin(angle) * r;
                if (i === 0) ringCtx.moveTo(x, y);
                else ringCtx.lineTo(x, y);
            }
            ringCtx.closePath();
            ringCtx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ringCtx.lineWidth = 1;
            ringCtx.stroke();

            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
