<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARALLAX // OFFICIAL</title>
    <style>
        /* --- HIGH FASHION / BRUTALIST BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Hides default cursor to use custom interactive element */
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            font-weight: 300;
        }

        /* --- THE INTERACTIVE MATRIX CANVAS --- */
        #vortexCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* --- FIXED SCREEN UI CORNERS --- */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Allows canvas interactions underneath */
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            padding: 40px;
        }

        .ui-element {
            pointer-events: auto; /* Re-enables clicking for links */
        }

        /* Top Left: Logo */
        .corner-top-left {
            grid-column: 1;
            grid-row: 1;
            align-self: start;
            justify-self: start;
        }
        
        .brand-name {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 0.6rem;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
        }

        /* Top Right: Premium Store Capsule */
        .corner-top-right {
            grid-column: 2;
            grid-row: 1;
            align-self: start;
            justify-self: end;
        }

        .store-pill {
            text-decoration: none;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 28px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            border-radius: 100px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .store-pill:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* Bottom Left: Concept Tag */
        .corner-bottom-left {
            grid-column: 1;
            grid-row: 2;
            align-self: end;
            justify-self: start;
        }

        .meta-tag {
            font-size: 0.65rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            opacity: 0.3;
        }

        /* Bottom Right: Clean Social Stack */
        .corner-bottom-right {
            grid-column: 2;
            grid-row: 2;
            align-self: end;
            justify-self: end;
        }

        .social-list {
            list-style: none;
            text-align: right;
        }

        .social-list li {
            margin-top: 8px;
        }

        .social-list a {
            text-decoration: none;
            color: #fff;
            font-size: 0.75rem;
            letter-spacing: 0.1rem;
            opacity: 0.4;
            transition: opacity 0.2s;
        }

        .social-list a:hover {
            opacity: 1;
        }

        /* --- CUSTOM MONOCHROME CURSOR --- */
        #customCursor {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: difference;
            transition: width 0.2s, height 0.2s;
        }

        body:active #customCursor {
            width: 25px;
            height: 25px;
        }

        /* Responsive UI layout scaling */
        @media (max-width: 768px) {
            .ui-layer { padding: 20px; grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; gap: 30px; }
            .corner-top-right { grid-column: 1; grid-row: 2; justify-self: start; }
            .corner-bottom-left { display: none; }
            .corner-bottom-right { grid-column: 1; grid-row: 3; justify-self: start; }
            .social-list { text-align: left; }
            * { cursor: auto; } #customCursor { display: none; }
        }
    </style>
</head>
<body>

    <!-- Target Follower / Pointer -->
    <div id="customCursor"></div>

    <!-- The Liquid Cosmic Canvas -->
    <canvas id="vortexCanvas"></canvas>

    <!-- UI Overlay Layout -->
    <div class="ui-layer">
        
        <div class="ui-element corner-top-left">
            <a href="#" class="brand-name">PARALLAX</a>
        </div>

        <div class="ui-element corner-top-right">
            <a href="https://boundless-official-store.printify.me/" target="_blank" class="store-pill">Official Store</a>
        </div>

        <div class="ui-element corner-bottom-left">
            <div class="meta-tag">SYSTEM // METALLIC VOID</div>
        </div>

        <div class="ui-element corner-bottom-right">
            <ul class="social-list">
                <li><a href="https://www.instagram.com/parallax.x.x?igsh=eTlnM20xZW5lcDUx&utm_source=qr" target="_blank">INSTAGRAM</a></li>
                <li><a href="https://m.youtube.com/@parallax.x.x?ra=m" target="_blank">YOUTUBE</a></li>
                <li><a href="https://x.com/Parallax_x_x" target="_blank">X.COM</a></li>
                <li><a href="https://www.facebook.com/Parallax.x.x.x.x/" target="_blank">FACEBOOK</a></li>
                <li><a href="https://www.tiktok.com/@parallax.x.x?_r=1&_t=ZT-94UGGvXVNug" target="_blank">TIKTOK</a></li>
                <li><a href="https://discord.com/invite/rhXuzGvM6" target="_blank">DISCORD</a></li>
            </ul>
        </div>

    </div>

    <!-- HIGH-INTERACTIVE LIQUID VORTEX SCRIPT -->
    <script>
        const canvas = document.getElementById('vortexCanvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('customCursor');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouse = { x: width / 2, y: height / 2 };
        
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            // Track custom ring cursor
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Particle configuration 
        let particles = [];
        const particleCount = 450; 

        function initParticles() {
            particles = [];
            const centerX = width / 2;
            const centerY = height / 2;
            
            for(let i = 0; i < particleCount; i++) {
                // Instantiating positions in a tight spiral galaxy ring structure
                let angle = Math.random() * Math.PI * 2;
                let radius = Math.random() * (Math.min(width, height) * 0.4) + 10;
                particles.push({
                    baseRadius: radius,
                    angle: angle,
                    speed: (Math.random() * 0.005 + 0.002) * (1 - radius / (Math.min(width, height) * 0.4)),
                    size: Math.random() * 1.5 + 0.2,
                    alpha: Math.random() * 0.5 + 0.1,
                    // Track internal physics vectors for smooth displacement recovery
                    vx: 0,
                    vy: 0,
                    cx: centerX,
                    cy: centerY
                });
            }
        }

        function drawAndWarp() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // Trail length overlay
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;

            particles.forEach(p => {
                // Natural orbital physics motion
                p.angle -= p.speed;
                let targetX = centerX + Math.cos(p.angle) * p.baseRadius;
                let targetY = centerY + Math.sin(p.angle) * p.baseRadius;

                // Mouse gravity dynamic warp calculations
                let dx = mouse.x - targetX;
                let dy = mouse.y - targetY;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceRadius = 150; // The reach area of the cursor warp distortion

                if (distance < forceRadius) {
                    // Pulls particles away or pushes them depending on vector angle, causing fluid liquid effect
                    let force = (forceRadius - distance) / forceRadius;
                    let angleForce = Math.atan2(dy, dx);
                    targetX -= Math.cos(angleForce) * force * 60;
                    targetY -= Math.sin(angleForce) * force * 60;
                }

                // Smooth particle position rendering
                p.cx += (targetX - p.cx) * 0.08;
                p.cy += (targetY - p.cy) * 0.08;

                // Render dynamic star coordinates
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.cx, p.cy, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(drawAndWarp);
        }

        initParticles();
        drawAndWarp();
    </script>
</body>
</html>
