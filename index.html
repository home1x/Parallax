<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax | Official</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- RESET & BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #050505;
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
        }

        /* --- INTERACTIVE CANVAS BACKGROUND --- */
        #galaxy-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: all;
        }

        /* --- MAIN CONTENT CONTAINER --- */
        .wrapper {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            padding: 3rem 2rem;
            pointer-events: none; /* Allows mouse to pass through to canvas */
        }

        /* Re-enable pointer events for interactive elements */
        .interactive-element {
            pointer-events: auto;
        }

        /* --- HERO HEADER --- */
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 2s ease-out;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 12px;
            /* Changed to allow normal capitalization */
            text-transform: none; 
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            margin-bottom: 0.8rem;
            transition: transform 0.3s ease;
        }

        h1:hover {
            transform: scale(1.03);
        }

        .subtitle {
            font-size: 0.8rem;
            font-weight: 200;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #888888;
        }

        /* --- LINKS & NAVIGATION --- */
        .links-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            animation: fadeIn 2.5s ease-out;
            margin-bottom: 2.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            text-decoration: none;
            color: #cccccc;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .nav-link i {
            font-size: 1.1rem;
            transition: transform 0.4s ease;
        }

        /* Hover Aesthetics */
        .nav-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .nav-link:hover i {
            transform: translateX(5px);
        }

        /* --- SUBSCRIPTION SECTION --- */
        .subscribe-panel {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            padding: 1.5rem;
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            animation: fadeIn 2.8s ease-out;
            margin-bottom: 2rem;
        }

        .subscribe-panel h3 {
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #aaaaaa;
            margin-bottom: 1rem;
        }

        .subscribe-form {
            display: flex;
            gap: 0.5rem;
        }

        .subscribe-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1rem;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            border-radius: 2px;
            outline: none;
            transition: all 0.3s ease;
        }

        .subscribe-input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.6);
        }

        .subscribe-btn {
            background: #ffffff;
            color: #050505;
            border: none;
            padding: 0.8rem 1.5rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .subscribe-btn:hover {
            background: #cccccc;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* --- FOOTER SOCIALS --- */
        footer {
            display: flex;
            gap: 1.8rem;
            animation: fadeIn 3.2s ease-out;
        }

        .social-icon {
            color: #555555;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            transform: scale(1.2);
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
                letter-spacing: 8px;
            }
            .subtitle {
                font-size: 0.7rem;
                letter-spacing: 4px;
            }
            .links-container, .subscribe-panel {
                padding: 1.2rem;
                width: 92%;
            }
            .nav-link {
                padding: 1rem 1.5rem;
                font-size: 0.8rem;
            }
            .subscribe-form {
                flex-direction: column;
            }
            .subscribe-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <canvas id="galaxy-canvas"></canvas>

    <div class="wrapper">
        
        <header class="interactive-element">
            <h1>Parallax</h1>
            <p class="subtitle">Official Portal</p>
        </header>

        <main class="links-container interactive-element">
            <a href="https://boundless-official-store.printify.me/" target="_blank" class="nav-link">
                <span>Official Store</span>
                <i class="fa-solid fa-bag-shopping"></i>
            </a>
            <a href="https://discord.com/invite/rhXuzGvM6" target="_blank" class="nav-link">
                <span>Discord Network</span>
                <i class="fa-brands fa-discord"></i>
            </a>
            <a href="https://m.youtube.com/@parallax.x.x?ra=m" target="_blank" class="nav-link">
                <span>YouTube Channel</span>
                <i class="fa-brands fa-youtube"></i>
            </a>
            <a href="https://www.instagram.com/parallax.x.x?igsh=eTlnM20xZW5lcDUx&utm_source=qr" target="_blank" class="nav-link">
                <span>Instagram</span>
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.tiktok.com/@parallax.x.x?_r=1&_t=ZT-94UGGvXVNug" target="_blank" class="nav-link">
                <span>TikTok</span>
                <i class="fa-brands fa-tiktok"></i>
            </a>
            <a href="https://www.facebook.com/Parallax.x.x.x.x/" target="_blank" class="nav-link">
                <span>Facebook</span>
                <i class="fa-brands fa-facebook-f"></i>
            </a>
        </main>

        <section class="subscribe-panel interactive-element">
            <h3>Subscribe for Updates</h3>
            <form class="subscribe-form" onsubmit="event.preventDefault(); alert('Subscribed successfully.');">
                <input type="email" class="subscribe-input" placeholder="ENTER YOUR EMAIL" required>
                <button type="submit" class="subscribe-btn">Join</button>
            </form>
        </section>

        <footer class="interactive-element">
            <a href="https://x.com/Parallax_x_x" target="_blank" class="social-icon" title="X (Twitter)"><i class="fa-brands fa-x-twitter"></i></a>
        </footer>

    </div>

    <script>
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 150;
        let mouse = { x: null, y: null, radius: 150 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                const grayValue = Math.floor(Math.random() * 155) + 100; 
                this.color = `rgba(${grayValue}, ${grayValue}, ${grayValue}, ${Math.random() * 0.6 + 0.2})`;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.baseSize = this.size;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }

                if (mouse.x !== null && mouse.y !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.hypot(dx, dy);
                    
                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x -= (dx / distance) * force * 2;
                        this.y -= (dy / distance) * force * 2;
                        this.size = this.baseSize * (1 + force * 1.5);
                    } else {
                        if (this.size > this.baseSize) this.size -= 0.1;
                    }
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = this.size * 2;
                ctx.shadowColor = '#ffffff';
                ctx.fill();
                ctx.shadowBlur = 0; 
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
